apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.tenantId }}-config
  namespace: {{ .Values.tenantId }}
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head><title>FDE Control Plane</title></head>
    <body style="background-color: #0a0a0a; color: #00ff00; font-family: monospace; padding: 50px;">
      <h1>[SYSTEM MATRIX ACTIVATED]</h1>
      <h2>Tenant ID: {{ .Values.tenantId }}</h2>
      <h3>Organization: {{ .Values.organizationName }}</h3>
      <hr/>
      <p><strong>Agent Operating Mode:</strong> {{ .Values.agentConfig.mode }}</p>
      <p><strong>Target Research Domain:</strong> {{ .Values.agentConfig.targetCategory }}</p>
    </body>
    </html>
